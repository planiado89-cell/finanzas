.bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}

function save(){try{localStorage.setItem("gp_jose_v3",JSON.stringify(gastos));}catch{}}
function fmt(n){return"$"+Math.round(Math.abs(n)).toLocaleString("es-MX")}
function tipoColor(t){return t==="Ingreso"?"#1D9E75":t==="Ahorro"?"#7F77DD":t==="Deuda-Pago"?"#E24B4A":"#2E75B6"}
function notif(m){const n=document.getElementById("notif");n.textContent=m;n.classList.add("show");setTimeout(()=>n.classList.remove("show"),2000)}
function gastosMes(){return gastos.filter(g=>{const d=new Date(g.fecha+"T00:00:00");return d.getMonth()===mesActual && d.getFullYear()===anioActual})}

function getAnios(){
  const s=new Set(gastos.map(g=>parseInt(g.fecha.slice(0,4))));
  return [...s].sort();
}

function renderAnios(){
  const c=document.getElementById("anios");c.innerHTML="";
  getAnios().forEach(a=>{
    const b=document.createElement("button");
    b.className="anio-btn"+(a===anioActual?" active":"");
    b.textContent=a;
    b.onclick=()=>{anioActual=a;document.getElementById("anio").textContent=a;renderAnios();renderMeses();renderTodo()};
    c.appendChild(b);
  });
}

function renderMeses(){
  const c=document.getElementById("meses");c.innerHTML="";
  MESES.forEach((m,i)=>{
    const tieneData=gastos.some(g=>{const d=new Date(g.fecha+"T00:00:00");return d.getMonth()===i && d.getFullYear()===anioActual});
    const b=document.createElement("button");
    b.className="mes-btn"+(i===mesActual?" active":"")+(tieneData?"":" opacity: 0.4");
    b.style.opacity=tieneData?"1":"0.4";
    b.textContent=m.slice(0,3);
    b.onclick=()=>{mesActual=i;renderMeses();renderTodo()};
    c.appendChild(b);
  });
}

function renderMetricas(){
  const gm=gastosMes();
  const ing=gm.filter(g=>g.tipo==="Ingreso").reduce((s,g)=>s+g.monto,0);
  const gas=gm.filter(g=>g.tipo==="Gasto").reduce((s,g)=>s+g.monto,0);
  const aho=gm.filter(g=>g.tipo==="Ahorro").reduce((s,g)=>s+g.monto,0);
  const sal=ing-gas-aho;
  document.getElementById("m-ing").textContent=fmt(ing);
  document.getElementById("m-gas").textContent=fmt(gas);
  document.getElementById("m-aho").textContent=fmt(aho);
  document.getElementById("m-sal").textContent=(sal>=0?"+":"-")+fmt(sal);
  document.getElementById("m-sal-card").className="metrica "+(sal>=0?"sal-pos":"sal-neg");
  document.getElementById("footer-count").textContent=gastos.length+" movimiento"+(gastos.length!==1?"s":"")+" en total";
}

function renderMovimientos(){
  const c=document.getElementById("lista-movs");
  const gm=[...gastosMes()].reverse();
  if(!gm.length){c.innerHTML='<div class="empty">Sin movimientos en '+MESES[mesActual]+'.</div>';return}
  c.innerHTML="";
  gm.forEach(g=>{
    const d=document.createElement("div");d.className="mov-item";
    d.innerHTML=`<div class="dot" style="background:${tipoColor(g.tipo)}"></div>
    <div class="mov-info"><div class="mov-cat">${g.categoria}</div>
    <div class="mov-fecha">${g.fecha}${g.detalle?" · "+g.detalle:""}</div></div>
    <div class="mov-monto" style="color:${tipoColor(g.tipo)}">${g.tipo==="Ingreso"?"+":"-"}${fmt(g.monto)}</div>
    <div class="mov-acciones">
      <button class="btn-sm" onclick="editar(${g.id})" style="color:#555">✎</button>
      <button class="btn-sm" onclick="eliminar(${g.id})" style="color:#A32D2D">×</button>
    </div>`;
    c.appendChild(d);
  });
}

function renderResumen(){
  const gm=gastosMes();
  document.getElementById("res-titulo").textContent="Top gastos — "+MESES[mesActual];
  const ing=gm.filter(g=>g.tipo==="Ingreso").reduce((s,g)=>s+g.monto,0);
  const gas=gm.filter(g=>g.tipo==="Gasto").reduce((s,g)=>s+g.monto,0);
  const aho=gm.filter(g=>g.tipo==="Ahorro").reduce((s,g)=>s+g.monto,0);
  const sal=ing-gas-aho;
  document.getElementById("r-ing").textContent=fmt(ing);
  document.getElementById("r-gas").textContent=fmt(gas);
  document.getElementById("r-aho").textContent=fmt(aho);
  const rs=document.getElementById("r-sal");
  rs.textContent=(sal>=0?"+":"-")+fmt(sal);
  rs.style.color=sal>=0?"#0F6E56":"#A32D2D";
  const porCat={};
  gm.filter(g=>g.tipo==="Gasto").forEach(g=>{porCat[g.categoria]=(porCat[g.categoria]||0)+g.monto});
  const top=Object.entries(porCat).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const maxV=top.length?top[0][1]:1;
  const barras=document.getElementById("barras");
  if(!top.length){barras.innerHTML='<div class="empty">Sin gastos en '+MESES[mesActual]+'</div>';return}
  barras.innerHTML="";
  top.forEach(([cat,monto])=>{
    const d=document.createElement("div");d.className="bar-row";
    d.innerHTML=`<div class="bar-label"><span>${cat}</span><span style="color:#A32D2D;font-weight:600">${fmt(monto)}</span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.round((monto/maxV)*100)}%"></div></div>`;
    barras.appendChild(d);
  });
}

const CAT_COLORS={
  "INGRESOS":"#0F6E56","CASA":"#2E75B6","COMUNICACIONES":"#6366f1","SEGUROS":"#0891b2",
  "TRANSPORTE":"#f59e0b","CRÉDITOS Y PAGOS":"#dc2626","FISCAL":"#7c3aed",
  "MAASER / TZEDAKÁ":"#059669","ANUALIDADES Y SUSCRIPCIONES":"#db2777",
  "SALUD":"#16a34a","ALIMENTACIÓN Y ENTRETENIMIENTO":"#ea580c",
  "COMPRAS":"#9333ea","AHORRO E INVERSIÓN":"#0369a1","VIAJES":"#d97706","OTROS":"#6b7280"
};
function renderCategorias(){
  const gm=gastosMes();
  const soloGastos=gm.filter(g=>g.tipo==="Gasto");
  const total=soloGastos.reduce((s,g)=>s+g.monto,0);
  const porCat={};
  soloGastos.forEach(g=>{porCat[g.categoria]=(porCat[g.categoria]||0)+g.monto;});
  const cont=document.getElementById("lista-cats");
  if(!Object.keys(porCat).length){cont.innerHTML='<div class="empty">Sin gastos en '+MESES[mesActual]+' '+anioActual+'</div>';return;}
  let html='';
  GRUPOS.forEach(gr=>{
    const catsConGasto=gr.cats.filter(c=>porCat[c]);
    if(!catsConGasto.length)return;
    const color=CAT_COLORS[gr.g]||"#6b7280";
    html+=`<div class="cat-grupo">${gr.g}</div>`;
    catsConGasto.sort((a,b)=>porCat[b]-porCat[a]).forEach(cat=>{
      const m=porCat[cat];
      const pct=total>0?Math.round((m/total)*100):0;
      html+=`<div class="cat-item">
        <div class="cat-dot" style="background:${color}"></div>
        <div class="cat-info">
          <div class="cat-nombre">${cat}</div>
          <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>
        <div class="cat-right">
          <div class="cat-monto">${fmt(m)}</div>
          <div class="cat-pct">${pct}%</div>
        </div>
      </div>`;
    });
  });
  html+=`<div class="cat-total-row"><span>Total gastos ${MESES[mesActual]}</span><span style="color:#A32D2D">${fmt(total)}</span></div>`;
  cont.innerHTML=html;
}

function renderProgreso(){
  const hoy=new Date();
  const esHoy=mesActual===hoy.getMonth()&&anioActual===hoy.getFullYear();
  const diasEnMes=new Date(anioActual,mesActual+1,0).getDate();
  const diaHoy=hoy.getDate();
  const box=document.getElementById("mes-progress-box");
  if(!esHoy){
    // Mes pasado o futuro: barra completa o vacía
    const esPasado=anioActual<hoy.getFullYear()||(anioActual===hoy.getFullYear()&&mesActual<hoy.getMonth());
    box.style.display=esPasado?"none":"none"; // ocultar en meses que no son el actual
    return;
  }
  box.style.display="block";
  const pct=Math.round((diaHoy/diasEnMes)*100);
  document.getElementById("prog-label").textContent=`${MESES[mesActual]} ${anioActual} — día ${diaHoy} de ${diasEnMes}`;
  document.getElementById("prog-dias").textContent=`${pct}% del mes transcurrido`;
  document.getElementById("prog-fill").style.width=pct+"%";
  // Color: verde si hay presupuesto sobrante, rojo si los gastos van muy altos
  const gas=parseFloat(document.getElementById("m-gas").textContent.replace(/[^0-9.]/g,""))||0;
  const ing=parseFloat(document.getElementById("m-ing").textContent.replace(/[^0-9.]/g,""))||0;
  const gastoEsperado=ing>0?(pct/100)*ing:0;
  const color=ing>0&&gas>gastoEsperado?"#dc2626":"#2E75B6";
  document.getElementById("prog-fill").style.background=`linear-gradient(90deg,${color},${color}aa)`;
}

function renderTodo(){renderMetricas();renderMovimientos();renderResumen();renderCategorias();renderProgreso()}

function guardar(){
  const fecha=document.getElementById("f-fecha").value;
  const tipo=document.getElementById("f-tipo").value;
  const categoria=document.getElementById("f-cat").value;
  const monto=parseFloat(document.getElementById("f-monto").value);
  const detalle=document.getElementById("f-detalle").value.trim();
  if(!fecha||isNaN(monto)||monto<=0){alert("Llena fecha y monto.");return}
  if(editId!==null){
    gastos=gastos.map(g=>g.id===editId?{id:editId,fecha,tipo,categoria,monto,detalle}:g);
    cancelarEdicion();notif("Actualizado");
  }else{
    gastos.push({id:Date.now(),fecha,tipo,categoria,monto,detalle});
    document.getElementById("f-monto").value="";
    document.getElementById("f-detalle").value="";
    document.getElementById("f-fecha").value=new Date().toISOString().split("T")[0];
    notif("Guardado");
  }
  save();renderTodo();
}

function eliminar(id){
  if(!confirm("¿Eliminar este movimiento?"))return;
  gastos=gastos.filter(g=>g.id!==id);save();renderTodo();notif("Eliminado");
}

function editar(id){
  const g=gastos.find(x=>x.id===id);if(!g)return;
  document.getElementById("f-fecha").value=g.fecha;
  document.getElementById("f-tipo").value=g.tipo;
  document.getElementById("f-cat").value=g.categoria;
  document.getElementById("f-monto").value=g.monto;
  document.getElementById("f-detalle").value=g.detalle||"";
  editId=id;
  document.getElementById("btn-guardar").textContent="Guardar cambios";
  document.getElementById("btn-cancel").style.display="block";
  document.getElementById("form-title").textContent="Editar movimiento";
  setTab("registrar");
}

function cancelarEdicion(){
  editId=null;
  document.getElementById("btn-guardar").textContent="+ Agregar";
  document.getElementById("btn-cancel").style.display="none";
  document.getElementById("form-title").textContent="Nuevo movimiento";
  document.getElementById("f-monto").value="";
  document.getElementById("f-detalle").value="";
}

function setTab(t){
  ["registrar","movimientos","categorias","resumen"].forEach((id,i)=>{
    document.getElementById("tab-"+id).style.display=id===t?"block":"none";
    document.querySelectorAll(".tab")[i].className="tab"+(id===t?" active":"");
  });
}

document.getElementById("f-monto").addEventListener("keydown",e=>{if(e.key==="Enter")guardar()});
document.getElementById("f-detalle").addEventListener("keydown",e=>{if(e.key==="Enter")guardar()});

renderAnios();renderMeses();renderTodo();
</script>
